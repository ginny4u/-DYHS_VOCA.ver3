<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>다의어 연습 · 문맥으로 뜻 가려내기</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#FFFFFF;
    --ink:#19191D;
    --ink2:#48484F;
    --muted:#9A9AA1;
    --faint:#F4F4F2;
    --line:#EAEAE7;
    --hl:#FFE36B;            /* 형광펜 — 제시문 핵심어 */
    --good:#178A52; --good-bg:#EAF6EF; --good-line:#BFE5CD;
    --bad:#D93B3B;  --bad-bg:#FBEBEB;  --bad-line:#F2CDCD;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,monospace;
    --sans:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    --serif:"Noto Serif KR",serif;
    --r:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);
    line-height:1.55;letter-spacing:-.011em;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    padding-bottom:calc(40px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:540px;margin:0 auto;padding:0 20px}

  /* top */
  .top{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.82);
    backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);
    border-bottom:1px solid transparent;transition:border-color .2s}
  .top.scrolled{border-color:var(--line)}
  .top-inner{max-width:540px;margin:0 auto;padding:15px 20px;display:flex;align-items:center;gap:12px}
  .word{font-weight:700;font-size:15px;letter-spacing:-.02em;cursor:pointer;display:flex;align-items:center;gap:8px}
  .word .dot{width:7px;height:7px;border-radius:50%;background:var(--ink);display:inline-block}
  .pcount{margin-left:auto;font-family:var(--mono);font-size:12.5px;color:var(--muted);letter-spacing:.02em;opacity:0;transition:opacity .25s}
  .pcount.on{opacity:1}
  .bar{height:2px;background:var(--line)}
  .bar > i{display:block;height:100%;width:0;background:var(--ink);transition:width .5s cubic-bezier(.4,0,.1,1)}

  .screen{padding-top:40px;animation:rise .4s cubic-bezier(.2,.7,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .hidden{display:none !important}

  .eyebrow{font-family:var(--mono);font-size:11.5px;font-weight:500;letter-spacing:.08em;
    text-transform:uppercase;color:var(--muted)}

  /* ── start ── */
  .hero h1{font-family:var(--serif);font-weight:600;font-size:30px;line-height:1.32;
    letter-spacing:-.02em;margin:14px 0 0;color:var(--ink)}
  .hero h1 .em{background:var(--hl);padding:.02em .16em;border-radius:3px;
    box-decoration-break:clone;-webkit-box-decoration-break:clone}
  .hero .lead{color:var(--ink2);font-size:15px;line-height:1.62;margin:16px 0 0;max-width:33ch}

  .label{font-size:12.5px;font-weight:600;color:var(--muted);margin:38px 0 12px;letter-spacing:-.01em}
  .chips{display:flex;flex-direction:column;gap:8px}
  .chip{appearance:none;display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    border:1px solid var(--line);background:#fff;color:var(--ink);
    font-family:var(--sans);font-size:15px;font-weight:500;padding:15px 17px;border-radius:13px;
    cursor:pointer;transition:border-color .16s,background .16s}
  .chip:hover{border-color:#d8d8d2}
  .chip .tick{margin-left:auto;width:18px;height:18px;border-radius:50%;border:1.5px solid var(--line);flex:none;transition:.16s}
  .chip .n{font-family:var(--mono);font-size:12px;color:var(--muted);font-weight:500}
  .chip[aria-pressed="true"]{border-color:var(--ink);background:#fff}
  .chip[aria-pressed="true"] .tick{border-color:var(--ink);background:var(--ink);
    box-shadow:inset 0 0 0 3px #fff}

  .cta{margin-top:22px;width:100%;border:none;cursor:pointer;font-family:var(--sans);
    background:var(--ink);color:#fff;font-size:16px;font-weight:600;padding:17px;border-radius:13px;
    letter-spacing:-.01em;transition:transform .12s,opacity .16s;display:flex;align-items:center;justify-content:center;gap:8px}
  .cta:hover{opacity:.92}
  .cta:active{transform:scale(.99)}
  .cta .sub{font-family:var(--mono);font-size:12px;opacity:.66;font-weight:500}

  .note-entry{margin-top:12px;width:100%;display:flex;align-items:center;gap:12px;
    border:1px solid var(--line);background:#fff;border-radius:13px;padding:15px 17px;cursor:pointer;
    font-family:var(--sans);color:var(--ink);transition:border-color .16s}
  .note-entry:hover{border-color:#d8d8d2}
  .note-entry .ico{flex:none;color:var(--ink2)}
  .note-entry .t{font-size:14.5px;font-weight:600}
  .note-entry .c{margin-left:auto;font-family:var(--mono);font-size:12.5px;color:var(--muted);
    display:flex;align-items:center;gap:8px}
  .note-entry .badge-n{background:var(--ink);color:#fff;border-radius:99px;padding:2px 9px;font-size:11.5px;font-weight:600}
  .chev{color:var(--muted)}

  .foot{margin-top:30px;display:flex;gap:9px;color:var(--muted);font-size:12px;line-height:1.55;align-items:flex-start}
  .foot svg{flex:none;margin-top:1px}

  /* ── quiz ── */
  .q-eyebrow{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--muted);font-weight:500;margin-bottom:18px}
  .q-eyebrow .w-au{color:var(--ink2);font-weight:600}
  .q-eyebrow .sep{width:3px;height:3px;border-radius:50%;background:var(--line)}
  .stem{font-family:var(--serif);font-weight:500;font-size:22px;line-height:1.72;letter-spacing:-.015em;color:var(--ink);
    padding:6px 0 2px}
  .stem .hl{font-weight:700;padding:.04em .16em;border-radius:3px;color:var(--ink);
    box-decoration-break:clone;-webkit-box-decoration-break:clone;
    background-image:linear-gradient(var(--hl),var(--hl));background-repeat:no-repeat;
    background-position:left center;background-size:0% 100%;
    animation:sweep .5s .15s forwards cubic-bezier(.3,.8,.3,1)}
  @keyframes sweep{to{background-size:100% 100%}}

  .prompt{font-size:13px;color:var(--muted);font-weight:600;margin:24px 0 13px;letter-spacing:-.01em}

  .opts{display:flex;flex-direction:column;gap:8px}
  .opt{position:relative;display:flex;gap:13px;align-items:flex-start;width:100%;text-align:left;
    background:#fff;border:1px solid var(--line);border-radius:13px;padding:15px 16px;cursor:pointer;
    font-family:var(--sans);color:var(--ink);transition:border-color .14s,background .14s,transform .07s}
  .opt:hover:not(:disabled){border-color:#cfcfc9}
  .opt:active:not(:disabled){transform:scale(.993)}
  .opt:disabled{cursor:default}
  .num{flex:none;width:22px;height:22px;border-radius:7px;background:var(--faint);
    display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--muted);margin-top:1px;transition:.14s}
  .opt-body{flex:1;min-width:0}
  .opt-text{font-size:15px;font-weight:450;line-height:1.5;color:var(--ink)}
  .opt-text u{text-decoration:none;font-weight:700;border-bottom:1.5px solid var(--ink);padding-bottom:1px}
  .sense{font-size:12.5px;font-weight:600;color:var(--muted);max-height:0;opacity:0;overflow:hidden;
    transition:max-height .3s,opacity .26s,margin .3s;margin-top:0}
  .opt.revealed .sense{max-height:44px;opacity:1;margin-top:8px}
  .opt .res-ic{position:absolute;right:14px;top:50%;transform:translateY(-50%) scale(.6);opacity:0;transition:.2s}
  .opt.revealed .res-ic{opacity:1;transform:translateY(-50%) scale(1)}

  .opt.correct{border-color:var(--good-line);background:var(--good-bg)}
  .opt.correct .num{background:var(--good);color:#fff}
  .opt.correct .opt-text u{border-color:var(--good)}
  .opt.correct .sense{color:var(--good)}
  .opt.wrong{border-color:var(--bad-line);background:var(--bad-bg)}
  .opt.wrong .num{background:var(--bad);color:#fff}
  .opt.wrong .opt-text u{border-color:var(--bad)}
  .opt.wrong .sense{color:var(--bad)}
  .opt.dim{opacity:.5}

  .explain{margin-top:15px;border-radius:13px;padding:14px 16px;font-size:13.5px;font-weight:550;line-height:1.55;
    display:flex;gap:10px;align-items:flex-start;background:var(--faint);border:1px solid var(--line);
    opacity:0;transform:translateY(5px);transition:.26s}
  .explain.on{opacity:1;transform:none}
  .explain.ok{background:var(--good-bg);border-color:var(--good-line)}
  .explain.no{background:var(--bad-bg);border-color:var(--bad-line)}
  .explain b{font-weight:700}
  .explain .lo{color:var(--muted)}

  .next{margin-top:18px;width:100%;border:none;cursor:pointer;font-family:var(--sans);
    background:var(--ink);color:#fff;font-size:15.5px;font-weight:600;padding:16px;border-radius:13px;
    opacity:0;transform:translateY(5px);pointer-events:none;transition:.24s;letter-spacing:-.01em}
  .next.on{opacity:1;transform:none;pointer-events:auto}
  .next:hover{opacity:.92}
  .kbd-hint{text-align:center;margin-top:13px;font-size:11.5px;color:var(--muted)}
  .kbd-hint kbd{font-family:var(--mono);font-size:10.5px;background:#fff;border:1px solid var(--line);
    border-bottom-width:2px;border-radius:5px;padding:1px 5px;margin:0 1px;color:var(--ink2)}

  /* ── result ── */
  .res{text-align:center;padding-top:14px}
  .res .big{font-family:var(--serif);font-weight:600;font-size:46px;letter-spacing:-.02em;line-height:1;margin:18px 0 0}
  .res .big .slash{color:var(--muted);font-weight:500}
  .res .rline{font-size:15px;color:var(--ink2);margin:14px 0 0;font-weight:550}
  .res .meter{height:6px;border-radius:99px;background:var(--line);margin:26px 0 0;overflow:hidden}
  .res .meter > i{display:block;height:100%;width:0;border-radius:99px;background:var(--ink);transition:width .8s cubic-bezier(.3,.9,.3,1)}

  .rev{margin-top:34px;text-align:left}
  .rev .rev-h{font-size:12.5px;color:var(--muted);font-weight:600;margin:0 0 12px}
  .rev-card{border:1px solid var(--line);border-radius:13px;padding:15px 16px;margin-bottom:9px}
  .rev-card .rw{font-size:14.5px;font-weight:600;display:flex;align-items:center;gap:8px}
  .rev-card .rw .wd{font-family:var(--serif);font-weight:600}
  .rev-card .rw .tg{font-family:var(--mono);font-size:11px;color:var(--muted);font-weight:500}
  .rev-card .rstem{font-family:var(--serif);font-size:14.5px;color:var(--ink2);margin-top:8px;line-height:1.6}
  .rev-card .rstem .hl{background:var(--hl);padding:.02em .12em;border-radius:2px;font-weight:600}
  .rev-card .rmean{font-size:13px;margin-top:9px;color:var(--muted);font-weight:550}
  .rev-card .rmean b{color:var(--good);font-weight:700}

  .saved{margin-top:18px;font-size:12.5px;color:var(--muted);display:flex;gap:8px;align-items:center;justify-content:center}

  .btn-stack{display:flex;flex-direction:column;gap:9px;margin-top:26px}
  .btn{border:none;cursor:pointer;font-family:var(--sans);font-weight:600;border-radius:13px;padding:16px;font-size:15px;transition:opacity .16s,border-color .16s,transform .1s}
  .btn:active{transform:scale(.99)}
  .btn-dark{background:var(--ink);color:#fff}
  .btn-dark:hover{opacity:.92}
  .btn-line{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn-line:hover{border-color:#cfcfc9}
  .btn[disabled]{opacity:.4;cursor:default}

  /* ── note ── */
  .note-head{display:flex;align-items:flex-end;gap:10px;margin-bottom:6px}
  .note-head h2{font-family:var(--serif);font-weight:600;font-size:26px;margin:0;letter-spacing:-.02em}
  .note-head .cnt{font-family:var(--mono);font-size:13px;color:var(--muted);padding-bottom:5px}
  .note-head .clear{margin-left:auto;background:none;border:none;color:var(--muted);font-family:var(--sans);
    font-size:12.5px;font-weight:600;cursor:pointer;padding:4px 2px;padding-bottom:5px}
  .note-head .clear:hover{color:var(--bad)}
  .note-sub{color:var(--muted);font-size:13px;margin:0 0 22px}
  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty .e-ic{margin:0 auto 16px;color:var(--line)}
  .empty .e-t{font-size:15px;font-weight:600;color:var(--ink2)}
  .empty .e-s{font-size:13px;margin-top:7px;line-height:1.6}
  .ncard{position:relative;border:1px solid var(--line);border-radius:13px;padding:16px;margin-bottom:9px}
  .ncard .ntop{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .ncard .nwd{font-family:var(--serif);font-weight:600;font-size:16px}
  .ncard .ntg{font-family:var(--mono);font-size:11px;color:var(--muted);font-weight:500}
  .ncard .nx{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;line-height:0;border-radius:6px}
  .ncard .nx:hover{color:var(--bad);background:var(--bad-bg)}
  .ncard .nstem{font-family:var(--serif);font-size:14.5px;color:var(--ink2);line-height:1.6}
  .ncard .nstem .hl{background:var(--hl);padding:.02em .12em;border-radius:2px;font-weight:600}
  .ncard .nmean{font-size:13px;margin-top:10px;color:var(--muted);font-weight:550}
  .ncard .nmean b{color:var(--ink);font-weight:700}
  .note-actions{position:sticky;bottom:0;background:linear-gradient(to top,#fff 70%,transparent);
    padding:14px 0 calc(8px + env(safe-area-inset-bottom));margin-top:6px}

  @media (max-width:380px){
    .hero h1{font-size:27px}.stem{font-size:20px}.res .big{font-size:40px}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important}
    .stem .hl{background-size:100% 100%}
    .next,.explain{opacity:1;transform:none}
  }
  :focus-visible{outline:2.5px solid var(--ink);outline-offset:2px;border-radius:8px}
</style>
</head>
<body>

<header class="top" id="top">
  <div class="top-inner">
    <div class="word" id="wordmark"><span class="dot"></span>다의어 연습</div>
    <span class="pcount" id="pcount"></span>
  </div>
  <div class="bar"><i id="barFill"></i></div>
</header>

<main class="wrap">

  <!-- START -->
  <section class="screen hero" id="start">
    <span class="eyebrow">국어 다의어 · 문맥 추론</span>
    <h1>낱말은 같아도,<br/><span class="em">뜻은 다르다.</span></h1>
    <p class="lead">교과서 세 작품에서 뽑은 다의어. 한 회차에 다섯 문항씩, 문맥에 맞는 뜻을 고르세요.</p>

    <div class="label">작품 고르기</div>
    <div class="chips" id="scopeChips">
      <button class="chip" data-scope="all" aria-pressed="true">전체 <span class="n" id="cAll"></span><span class="tick"></span></button>
      <button class="chip" data-scope="blues" aria-pressed="false">우리들의 블루스 · 노희경 <span class="n" id="cBlues"></span><span class="tick"></span></button>
      <button class="chip" data-scope="gwansang" aria-pressed="false">이상한 관상가 · 이규보 <span class="n" id="cGwan"></span><span class="tick"></span></button>
      <button class="chip" data-scope="manse" aria-pressed="false">만세전 · 염상섭 <span class="n" id="cManse"></span><span class="tick"></span></button>
    </div>

    <button class="cta" id="goBtn">시작하기 <span class="sub">5문항</span></button>

    <button class="note-entry" id="noteEntry">
      <span class="ico"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 2.5h7l3 3v10H4z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M11 2.5v3h3M6.4 9h5.2M6.4 11.6h3.6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></span>
      <span class="t">오답노트</span>
      <span class="c"><span class="badge-n" id="noteCount">0</span><svg class="chev" width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    </button>

    <div class="foot">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.7" stroke="currentColor" stroke-width="1.2"/><path d="M8 7v4M8 4.7v.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span>보기는 표준국어대사전의 의미 구분에 따라 다듬은 예문입니다. 다섯 보기는 모두 다른 뜻이며 정답은 하나입니다.</span>
    </div>
  </section>

  <!-- QUIZ -->
  <section class="screen hidden" id="quiz">
    <div class="q-eyebrow"><span class="w-au" id="qTag"></span></div>
    <div class="stem" id="stem"></div>
    <p class="prompt" id="prompt"></p>
    <div class="opts" id="opts"></div>
    <div class="explain" id="explain"></div>
    <button class="next" id="nextBtn">다음</button>
    <p class="kbd-hint"><kbd>1</kbd>–<kbd>5</kbd> 선택 · <kbd>Enter</kbd> 다음</p>
  </section>

  <!-- RESULT -->
  <section class="screen hidden" id="result">
    <div class="res">
      <span class="eyebrow">결과</span>
      <div class="big"><span id="resN">0</span><span class="slash"> / 5</span></div>
      <p class="rline" id="resLine"></p>
      <div class="meter"><i id="resMeter"></i></div>
      <p class="saved" id="savedHint"></p>
      <div class="rev hidden" id="revBox">
        <div class="rev-h">이번 회차 오답</div>
        <div id="revList"></div>
      </div>
      <div class="btn-stack">
        <button class="btn btn-dark" id="againBtn">새 5문항 풀기</button>
        <button class="btn btn-line" id="resNoteBtn">오답노트 보기</button>
        <button class="btn btn-line" id="homeBtn">처음으로</button>
      </div>
    </div>
  </section>

  <!-- NOTE -->
  <section class="screen hidden" id="note">
    <div class="note-head">
      <h2>오답노트</h2><span class="cnt" id="noteHeadCnt"></span>
      <button class="clear" id="clearNote">전체 비우기</button>
    </div>
    <p class="note-sub">틀린 문항이 여기에 모입니다. 다시 풀어 맞히면 노트에서 사라져요.</p>
    <div id="noteList"></div>
    <div class="note-actions" id="noteActions">
      <button class="btn btn-dark" id="noteRetry" style="width:100%">오답에서 5문항 풀기</button>
      <button class="btn btn-line" id="noteHome" style="width:100%;margin-top:9px">처음으로</button>
    </div>
  </section>

</main>

<script>
const QUESTIONS = [
  /* ── 보다 ── */
  {work:"blues", w:"보다", stem:"돌고래 «보는» 거랑, 엄마 아빠랑 노는 거랑…….", a:0, o:[
    {t:"그는 창밖으로 지나가는 사람들을 [보았다].", s:"눈으로 대상을 바라보다"},
    {t:"점쟁이가 그의 사주를 [보더니] 혀를 찼다.", s:"점·운수를 알아보다"},
    {t:"동생이 다음 주에 기말고사를 [본다].", s:"시험을 치르다"},
    {t:"어머니가 시장에 장을 [보러] 가셨다.", s:"물건을 사다"},
    {t:"할머니가 종일 손주를 [보느라] 지치셨다.", s:"맡아서 돌보다"},
  ]},

    {t:"네 일은 네가 [알아서] 해라.", s:"맡아서 처리하다"},
    {t:"그는 제 분수를 [아는] 사람이다.", s:"분별하여 헤아리다"},
  ]},

  /* ── 가다 ── */
  {work:"manse", w:"가다", stem:"말도 모르고 단신 일본으로 공부 «간다는» 데에.", a:0, o:[
    {t:"그는 이른 아침 학교로 [갔다].", s:"한 곳에서 다른 곳으로 이동하다"},
    {t:"무심한 세월이 빠르게 [간다].", s:"시간이 지나가다"},
    {t:"낡은 벽에 금이 쩍 [갔다].", s:"금·균열이 생기다"},
    {t:"더위에 음식이 금세 맛이 [갔다].", s:"본래 상태가 상하다"},
    {t:"자꾸 그 아이에게 정이 [간다].", s:"마음·관심이 쏠리다"},
  ]},

  /* ── 쓰다 (2) ── */
  {work:"manse", w:"쓰다", stem:"무덤은 공동묘지밖에 «쓸» 수 없다고 한다.", a:0, o:[
    {t:"이 도구는 여러 곳에 요긴하게 [쓴다].", s:"어떤 일에 이용하다"},
    {t:"그는 햇볕을 가리려 밀짚모자를 [썼다].", s:"머리·얼굴에 덮어 얹다"},
    {t:"아이가 공책에 또박또박 글씨를 [썼다].", s:"글자를 적다"},
    {t:"한약이 입에 너무 [써서] 삼키기 힘들었다.", s:"맛이 쓰다"},
    {t:"그는 억울하게 누명을 [썼다].", s:"죄·허물을 뒤집어쓰다"},
  ]},
];
/* ============================================================
   APP
   ============================================================ */
const WORKS = {
  blues:    {tag:"우리들의 블루스", au:"노희경"},
  gwansang: {tag:"이상한 관상가",   au:"이규보"},
  manse:    {tag:"만세전",          au:"염상섭"}
};

const $ = s => document.querySelector(s);
const screens = {start:$("#start"), quiz:$("#quiz"), result:$("#result"), note:$("#note")};
function show(name){
  for(const k in screens) screens[k].classList.toggle("hidden", k!==name);
  $("#pcount").classList.toggle("on", name==="quiz");
  window.scrollTo({top:0, behavior:"instant"});
}

const markStem = t => t.replace(/«(.+?)»/g, '<span class="hl">$1</span>');
const markOpt  = t => t.replace(/\[(.+?)\]/g, '<u>$1</u>');
const shuffle  = arr => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];} return a; };

/* stable id per question + lookup */
const idOf = q => q.work + "|" + q.stem;
const BY_ID = {}; QUESTIONS.forEach(q => BY_ID[idOf(q)] = q);

/* ── safe storage (works hosted; falls back to memory in restricted previews) ── */
const Store = (() => {
  let mem = {}, ok = false;
  try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); ok = true; } catch(e){}
  return {
    get(k,d){ try{ if(ok){ const v=localStorage.getItem(k); return v==null?d:JSON.parse(v); } }catch(e){} return (k in mem)?mem[k]:d; },
    set(k,v){ try{ if(ok){ localStorage.setItem(k,JSON.stringify(v)); return; } }catch(e){} mem[k]=v; }
  };
})();

let wrongNote = (Store.get("wrongNote_v1", [])).filter(id => BY_ID[id]); // drop stale ids
function saveNote(){ Store.set("wrongNote_v1", wrongNote); }
function addWrong(id){ if(!wrongNote.includes(id)){ wrongNote.push(id); saveNote(); } }
function dropWrong(id){ const i=wrongNote.indexOf(id); if(i>-1){ wrongNote.splice(i,1); saveNote(); } }

/* counts on start chips */
const countBy = w => QUESTIONS.filter(q=>q.work===w).length;
$("#cAll").textContent   = QUESTIONS.length;
$("#cBlues").textContent = countBy("blues");
$("#cGwan").textContent  = countBy("gwansang");
$("#cManse").textContent = countBy("manse");
function refreshNoteCount(){ $("#noteCount").textContent = wrongNote.length; }
refreshNoteCount();

/* ── session state ── */
let scope="all", deck=[], idx=0, locked=false, mode="normal", sessionWrong=[], correctCount=0;

$("#scopeChips").addEventListener("click", e=>{
  const b=e.target.closest(".chip"); if(!b) return;
  [...e.currentTarget.children].forEach(c=>c.setAttribute("aria-pressed", c===b));
  scope=b.dataset.scope;
});

const poolFor = sc => sc==="all" ? QUESTIONS : QUESTIONS.filter(q=>q.work===sc);

function buildDeck(pool){
  return shuffle(pool).slice(0,5).map(q=>{
    const ord = shuffle(q.o.map((o,i)=>({o,i})));
    return { id:idOf(q), work:q.work, w:q.w, stem:q.stem,
             opts:ord.map(x=>x.o), ans:ord.findIndex(x=>x.i===q.a) };
  });
}

function startSession(m){
  mode = m;
  const pool = (m==="note")
    ? wrongNote.map(id=>BY_ID[id]).filter(Boolean)
    : poolFor(scope);
  if(!pool.length) return;
  deck = buildDeck(pool);
  idx=0; sessionWrong=[]; correctCount=0;
  show("quiz");
  renderQ();
}
$("#goBtn").addEventListener("click", ()=>startSession("normal"));

function renderQ(){
  locked=false;
  const q=deck[idx];
  const W=WORKS[q.work];
  $("#qTag").innerHTML = `<span class="w-au">${W.au} · ${W.tag}</span>`;
  $("#pcount").textContent = `${idx+1} / ${deck.length}`;
  $("#barFill").style.width = `${(idx/deck.length)*100}%`;
  $("#stem").innerHTML = markStem(q.stem);
  $("#prompt").textContent = `표시된 ‘${q.w}’와 문맥상 뜻이 가장 가까운 것은?`;

  const wrap=$("#opts"); wrap.innerHTML="";
  q.opts.forEach((o,i)=>{
    const btn=document.createElement("button");
    btn.className="opt"; btn.type="button";
    btn.innerHTML =
      `<span class="num">${i+1}</span>`+
      `<span class="opt-body"><span class="opt-text">${markOpt(o.t)}</span>`+
      `<span class="sense">${o.s}</span></span>`+
      `<span class="res-ic"></span>`;
    btn.addEventListener("click", ()=>choose(i));
    wrap.appendChild(btn);
  });

  $("#explain").className="explain"; $("#explain").innerHTML="";
  const nb=$("#nextBtn"); nb.className="next";
  nb.textContent = idx===deck.length-1 ? "결과 보기" : "다음";
}

const OK = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="10" fill="#178A52"/><path d="M6 10.4l2.6 2.6L14.4 7" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const NO = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="10" fill="#D93B3B"/><path d="M7 7l6 6M13 7l-6 6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>`;

function choose(i){
  if(locked) return; locked=true;
  const q=deck[idx];
  const btns=[...$("#opts").children];
  const right = i===q.ans;

  btns.forEach((b,j)=>{
    b.disabled=true; b.classList.add("revealed");
    if(j===q.ans){ b.classList.add("correct"); b.querySelector(".res-ic").innerHTML=OK; }
    else if(j===i){ b.classList.add("wrong"); b.querySelector(".res-ic").innerHTML=NO; }
    else b.classList.add("dim");
  });

  const ans=q.opts[q.ans], ex=$("#explain");
  if(right){
    correctCount++;
    if(mode==="note") dropWrong(q.id);         // 오답노트에서 다시 맞히면 졸업
    ex.className="explain ok on";
    ex.innerHTML=`<span>${OK}</span><span>‘${q.w}’는 여기서 <b>${ans.s}</b>의 뜻입니다.</span>`;
  }else{
    const picked=q.opts[i];
    sessionWrong.push(q.id);
    addWrong(q.id);                              // 오답노트에 누적
    ex.className="explain no on";
    ex.innerHTML=`<span>${NO}</span><span>고른 문장의 ‘${q.w}’는 <span class="lo">${picked.s}</span>. 정답은 ${q.ans+1}번, <b>${ans.s}</b>입니다.</span>`;
  }
  refreshNoteCount();
  $("#barFill").style.width = `${((idx+1)/deck.length)*100}%`;
  $("#nextBtn").classList.add("on");
}

function next(){
  if(!locked) return;
  if(idx<deck.length-1){ idx++; renderQ(); }
  else finish();
}
$("#nextBtn").addEventListener("click", next);

function finish(){
  const total=deck.length, right=correctCount;
  show("result");
  $("#pcount").classList.remove("on");
  $("#resN").textContent=right;
  document.querySelector(".res .slash").textContent=` / ${total}`;
  $("#resMeter").style.width="0";
  requestAnimationFrame(()=>{ $("#resMeter").style.width=`${(right/total)*100}%`; });

  const pct=Math.round(right/total*100);
  let line;
  if(pct===100) line="완벽합니다. 다섯 문항 모두 정확해요.";
  else if(pct>=80) line="잘했어요. 한두 개만 더 살피면 완성입니다.";
  else if(pct>=40) line="좋아요. 헷갈린 뜻은 오답노트에서 다시 봐요.";
  else line="천천히. 오답노트의 뜻 구분부터 익혀 봐요.";
  $("#resLine").textContent=line;

  const newlyWrong = mode==="note" ? [] : sessionWrong;
  $("#savedHint").innerHTML = sessionWrong.length
    ? `<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 8l3 3 5-6" stroke="#9A9AA1" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> 틀린 ${sessionWrong.length}문항을 오답노트에 담았어요`
    : (mode==="note" ? "오답노트에서 푼 회차입니다" : "이번 회차는 모두 맞혔어요");

  const box=$("#revBox"), list=$("#revList");
  if(sessionWrong.length){
    box.classList.remove("hidden"); list.innerHTML="";
    sessionWrong.forEach(id=>{
      const q=BY_ID[id], W=WORKS[q.work];
      const correctSense=q.o[q.a].s;
      const d=document.createElement("div"); d.className="rev-card";
      d.innerHTML=
        `<div class="rw"><span class="wd">${q.w}</span><span class="tg">${W.au} · ${W.tag}</span></div>`+
        `<div class="rstem">${markStem(q.stem)}</div>`+
        `<div class="rmean">문맥상 뜻 · <b>${correctSense}</b></div>`;
      list.appendChild(d);
    });
  } else box.classList.add("hidden");
}

$("#againBtn").addEventListener("click", ()=>startSession("normal"));
$("#resNoteBtn").addEventListener("click", openNote);
$("#homeBtn").addEventListener("click", goHome);

/* ── 오답노트 ── */
function goHome(){ refreshNoteCount(); show("start"); }
function openNote(){ renderNote(); show("note"); }

function renderNote(){
  refreshNoteCount();
  $("#noteHeadCnt").textContent = `${wrongNote.length}문항`;
  const list=$("#noteList"), actions=$("#noteActions");
  if(!wrongNote.length){
    list.innerHTML =
      `<div class="empty"><div class="e-ic"><svg width="44" height="44" viewBox="0 0 44 44" fill="none"><rect x="9" y="6" width="22" height="30" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M16 15h9M16 21h9M16 27h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></div>`+
      `<div class="e-t">아직 담긴 오답이 없어요</div>`+
      `<div class="e-s">문제를 풀다 틀리면<br/>그 문항이 자동으로 여기 모입니다.</div></div>`;
    actions.style.display="none";
    return;
  }
  actions.style.display="block";
  $("#noteRetry").textContent = `오답에서 ${Math.min(5,wrongNote.length)}문항 풀기`;
  list.innerHTML="";
  // 최근에 담긴 것부터
  [...wrongNote].reverse().forEach(id=>{
    const q=BY_ID[id]; if(!q) return;
    const W=WORKS[q.work], correctSense=q.o[q.a].s;
    const c=document.createElement("div"); c.className="ncard";
    c.innerHTML=
      `<div class="ntop"><span class="nwd">${q.w}</span><span class="ntg">${W.au} · ${W.tag}</span>`+
      `<button class="nx" data-id="${id.replace(/"/g,'&quot;')}" aria-label="삭제"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button></div>`+
      `<div class="nstem">${markStem(q.stem)}</div>`+
      `<div class="nmean">문맥상 뜻 · <b>${correctSense}</b></div>`;
    list.appendChild(c);
  });
}
$("#noteList").addEventListener("click", e=>{
  const x=e.target.closest(".nx"); if(!x) return;
  dropWrong(x.dataset.id); renderNote();
});
$("#noteEntry").addEventListener("click", openNote);
$("#noteRetry").addEventListener("click", ()=>startSession("note"));
$("#noteHome").addEventListener("click", goHome);
$("#clearNote").addEventListener("click", ()=>{
  if(!wrongNote.length) return;
  if(confirm("오답노트를 모두 비울까요? 되돌릴 수 없습니다.")){
    wrongNote=[]; saveNote(); renderNote();
  }
});
$("#wordmark").addEventListener("click", goHome);

/* ── keyboard ── */
document.addEventListener("keydown", e=>{
  if(!screens.quiz.classList.contains("hidden")){
    if(e.key>="1" && e.key<="5"){ const b=$("#opts").children[+e.key-1]; if(b && !locked) b.click(); }
    else if(e.key==="Enter" || e.key==="ArrowRight"){ if(locked) next(); }
  } else if(!screens.start.classList.contains("hidden")){
    if(e.key==="Enter") startSession("normal");
  }
});

/* top border on scroll */
const topEl=$("#top");
addEventListener("scroll", ()=>{ topEl.classList.toggle("scrolled", window.scrollY>4); }, {passive:true});
</script>
</body>
